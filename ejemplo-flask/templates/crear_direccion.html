<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Dirección</title>
</head>
<body>
    <div class="container">
        <h1>Crear Nueva Dirección</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-messages">
            {% for category, message in messages %}
              <li class="flash-message flash-{{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div>
                <label for="descripcion">Descripción:</label>
                <input type="text" id="descripcion" name="descripcion" required>
            </div>

            <div>
                <label for="tipo">Tipo:</label>
                <input type="text" id="tipo" name="tipo" required>
            </div>

            <div>
                <label for="estudiante">Estudiante:</label>
                <select id="estudiante" name="estudiante" required>
                    <option value="" disabled selected>Seleccione un estudiante</option>

                    {% for estudiante in estudiantes %}
                        <option value="{{ estudiante.id }}">
                            {{ estudiante.nombre }} {{ estudiante.apellido }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">Crear Dirección</button>
        </form>

        <a href="{{ url_for('las_direcciones_dos') }}">
            Volver a la lista de direcciones
        </a>
    </div>
</body>
</html>
